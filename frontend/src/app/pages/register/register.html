<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">PlanSync</h1>
    <p class="auth-subtitle">Создайте аккаунт</p>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input type="text" [(ngModel)]="username" placeholder="username" class="input" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="you@example.com" class="input" />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" class="input" />
    </div>

    @if (error) {
      <div class="error-box">{{ error }}</div>
    }

    <button class="btn-primary" (click)="onRegister()" [disabled]="loading">
      {{ loading ? 'Регистрируем...' : 'Зарегистрироваться' }}
    </button>

    <p class="auth-link">
      Уже есть аккаунт? <a routerLink="/login">Войти</a>
    </p>
  </div>
</div>
