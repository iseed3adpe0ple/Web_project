<div class="auth-wrapper">
  <div class="auth-card">
    <h1 class="auth-title">PlanSync</h1>
    <p class="auth-subtitle">Войдите в аккаунт</p>

    <div class="form-group">
      <label>Имя пользователя</label>
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="username"
        class="input"
      />
    </div>

    <div class="form-group">
      <label>Пароль</label>
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        class="input"
      />
    </div>

    @if (error) {
      <div class="error-box">{{ error }}</div>
    }

    <button class="btn-primary" (click)="onLogin()" [disabled]="loading">
      {{ loading ? 'Входим...' : 'Войти' }}
    </button>

    <p class="auth-link">
      Нет аккаунта? <a routerLink="/register">Зарегистрироваться</a>
    </p>
  </div>
</div>
